name = "text-format"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静态资源配置 - 使用 [assets] 而不是 [site]
[assets]
directory = ".open-next/assets"

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_SITE_URL = "https://text-format.com"
NEXT_PUBLIC_PROJECT_NAME = "Text-Format"

# 如果有 Google Analytics 和 AdSense 配置，添加以下变量
# NEXT_PUBLIC_GOOGLE_ANALYTICS_ID = "your_ga_id"
# NEXT_PUBLIC_GOOGLE_ADSENSE_CLIENT_ID = "your_adsense_client_id"